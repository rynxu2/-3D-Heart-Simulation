# Training Configuration
model:
  # Options: efficientnet_b4, resnet50, resnet3d_18
  backbone: efficientnet_b4
  num_classes: 2
  pretrained: true
  dropout: 0.3

data:
  image_size: 224
  batch_size: 32
  num_workers: 4
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

training:
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 10
  mixed_precision: true

augmentation:
  horizontal_flip: true
  rotation_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  gaussian_blur: true
  normalize: true

labels:
  - normal
  - abnormal
  - infarction

label_to_bpm:
  normal:
    min: 60
    max: 80
    pattern: regular
  abnormal:
    min: 40
    max: 120
    pattern: irregular
  infarction:
    min: 90
    max: 130
    pattern: rapid_irregular
