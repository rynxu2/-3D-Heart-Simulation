# SynPAIN Training Configuration
# Dataset: TaatiTeam/SynPAIN (Hugging Face)
# Strategy C: Transfer Learning (binary pre-training → future 3-class fine-tune)

dataset:
  name: "TaatiTeam/SynPAIN"
  cache_dir: "data/synpain_cache"
  filter_type: "Images"
  label_strategy: "binary"  # "binary" | "3class"

model:
  backbone: efficientnet_b4
  num_classes: 2  # Binary: Pain / NoPain
  pretrained: true
  dropout: 0.3
  freeze_epochs: 5

data:
  image_size: 224
  batch_size: 16
  num_workers: 2
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

training:
  epochs: 30
  learning_rate: 0.00005
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 8
  mixed_precision: true

augmentation:
  horizontal_flip: true
  rotation_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  gaussian_blur: true
  normalize: true

labels:
  - no_pain
  - pain
