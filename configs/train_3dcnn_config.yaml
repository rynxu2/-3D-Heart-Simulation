# 3D CNN Training Configuration
# Model: ResNet3D-18 (Kinetics-400 pretrained)
# Task: 3-class heart condition from face video clips

model:
  backbone: r3d_18
  num_classes: 3
  num_frames: 16
  pretrained: true
  dropout: 0.3
  freeze_epochs: 5

data:
  data_dir: "data/raw"
  image_size: 224
  batch_size: 8       # 3D CNN uses more VRAM than 2D
  num_workers: 2
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

training:
  epochs: 40
  learning_rate: 0.00005
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: cosine
  early_stopping_patience: 10
  mixed_precision: true

  phase1:
    description: "Freeze backbone, train classifier head only"
    epochs: 5
    learning_rate: 0.001
  phase2:
    description: "Unfreeze all, fine-tune with low LR"
    epochs: 35
    learning_rate: 0.00005

augmentation:
  horizontal_flip: true
  rotation_limit: 15
  brightness_limit: 0.2
  contrast_limit: 0.2
  gaussian_blur: true
  normalize: true

labels:
  - normal
  - abnormal
  - infarction

label_to_bpm:
  normal:
    min: 60
    max: 80
    pattern: regular
  abnormal:
    min: 40
    max: 120
    pattern: irregular
  infarction:
    min: 90
    max: 130
    pattern: rapid_irregular
